<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>index</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .stats {
      display: flex;
      gap: 30px;
      margin: 30px 0;
    }
    .stat-item {
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>Учебная система</h1>
  
  <div class="stats">
    <div class="stat-item">
      <h3>Преподаватели</h3>
      <p style="font-size: 32px;">{{ teachers_count }}</p>
    </div>
    <div class="stat-item">
      <h3>Курсы</h3>
      <p style="font-size: 32px;">{{ courses_count }}</p>
    </div>
    <div class="stat-item">
      <h3>Студенты</h3>
      <p style="font-size: 32px;">{{ students_count }}</p>
    </div>
  </div>
  
  <p>Страницы:</p>
  <p><a href="{% url 'courses' %}">Курсы</a></p>
  <p><a href="{% url 'authors' %}">Преподаватели</a></p>
  <p><a href="{% url 'students' %}">Студенты</a></p>
  <p><a href="{% url 'info' %}">Информация</a></p>

</body>
</html>
