{% extends "base.html" %}

{% block title %}Вход{% endblock %}
{% block heading %}Вход{% endblock %}

{% block content %}
{% if form.errors %}
<p>Неверный логин или пароль.</p>
{% endif %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <button type="submit">Войти</button>
</form>
<p><a href="{% url 'password_reset' %}">Забыли пароль?</a></p>
{% endblock %}
