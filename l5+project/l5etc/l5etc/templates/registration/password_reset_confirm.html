{% extends "base.html" %}

{% block title %}Новый пароль{% endblock %}
{% block heading %}Новый пароль{% endblock %}

{% block content %}
{% if validlink %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить пароль</button>
</form>
{% else %}
<p>Ссылка недействительна. Запросите восстановление пароля еще раз.</p>
{% endif %}
{% endblock %}
